    function initSequenceBlockInterface() {
        const matrix = document.getElementById('block-matrix-container');
        
        document.getElementById('btn-seqw').addEventListener('click', () => {
            const currentString = seqInput.value;
            if(!currentString.trim()) return;

            const randomHue = Math.floor(Math.random() * 360);
            const color = `hsl(${randomHue}, 75%, 55%)`;
            const block = createBlockElement(currentString, color);

            matrix.appendChild(block);
            
            if(!highlightedBlock) {
                block.classList.add('highlighted');
                highlightedBlock = block;
            }
            updatePatchString();
        });

        document.getElementById('btn-seqr').addEventListener('click', () => {
            if(!highlightedBlock) return;
            seqInput.value = highlightedBlock.dataset.sequence;
            parseSeqText();
            seqInput.scrollLeft = seqInput.scrollWidth;
        });

        document.getElementById('btn-sequ').addEventListener('click', () => {
            if(!highlightedBlock) return;
            highlightedBlock.dataset.sequence = seqInput.value;
            updatePatchString();
        });

        document.getElementById('btn-seqc').addEventListener('click', () => {
            if(!highlightedBlock) return;
            const seqStr = highlightedBlock.dataset.sequence;
            const colorStr = highlightedBlock.style.background;
            
            const clonedBlock = createBlockElement(seqStr, colorStr);
            matrix.appendChild(clonedBlock);
            updatePatchString();
        });

        document.getElementById('btn-seqd').addEventListener('click', () => {
            if(!highlightedBlock) return;
            const fallbackBlock = highlightedBlock.nextElementSibling || highlightedBlock.previousElementSibling;
            
            highlightedBlock.remove();
            highlightedBlock = null;

            if(fallbackBlock) {
                fallbackBlock.classList.add('highlighted');
                highlightedBlock = fallbackBlock;
            }
            updatePatchString();
        });

        document.getElementById('btn-movl').addEventListener('click', () => {
            if(!highlightedBlock) return;
            const prev = highlightedBlock.previousElementSibling;
            if(prev) {
                matrix.insertBefore(highlightedBlock, prev);
                updatePatchString();
            }
        });

        document.getElementById('btn-movr').addEventListener('click', () => {
            if(!highlightedBlock) return;
            const next = highlightedBlock.nextElementSibling;
            if(next) {
                matrix.insertBefore(next, highlightedBlock);
                updatePatchString();
            }
        });
    }

    // ─── Clock, Timing & Playback Engine ──────────────────────────────
    let bpm = 120;
    let isPlaying = false;
    let nextNoteTime = 0.0;
    let currentSeqIndex = 0;
    let tapTimes = [];
    let scheduleIntervalId = null;

    function initClockAndAutomation() {
        const bpmSlider = document.getElementById('bpm-slider');
        const bpmVal = document.getElementById('bpm-val');
        const tapBtn = document.getElementById('tap-bpm');
        const playBtn = document.getElementById('play-seq');
        const songBtn = document.getElementById('play-song');

        bpmSlider.addEventListener('input', (e) => {
            bpm = parseInt(e.target.value, 10);
            bpmVal.textContent = bpm;
            updatePatchString();
        });

        tapBtn.addEventListener('click', () => {
            const now = performance.now();
            tapTimes.push(now);
            if (tapTimes.length > 4) tapTimes.shift();
            
            if (tapTimes.length >= 2) {
                let accum = 0;
                for (let i = 1; i < tapTimes.length; i++) {
                    accum += (tapTimes[i] - tapTimes[i - 1]);
                }
                const avgDiff = accum / (tapTimes.length - 1);
                bpm = Math.round(60000 / avgDiff);
                if (bpm < 60) bpm = 60;
                if (bpm > 240) bpm = 240;

                bpmSlider.value = bpm;
                bpmVal.textContent = bpm;
                updatePatchString();
            }
        });

        playBtn.addEventListener('click', () => {
            if(songPlaying) stopSongPlayback();
            
            isPlaying = !isPlaying;
            if (isPlaying) {
                playBtn.style.background = 'var(--active-glow)';
                playBtn.style.color = '#fff';
                currentSeqIndex = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduleIntervalId = setInterval(scheduler, 15);
            } else {
                playBtn.style.background = '#333';
                playBtn.style.color = 'var(--seq-color)';
                if (scheduleIntervalId) {
                    clearInterval(scheduleIntervalId);
                    scheduleIntervalId = null;
                }
            }
        });

        songBtn.addEventListener('click', () => {
            if(isPlaying) {
                isPlaying = false;
                playBtn.style.background = '#333';
                playBtn.style.color = 'var(--seq-color)';
                if (scheduleIntervalId) clearInterval(scheduleIntervalId);
            }

            songPlaying = !songPlaying;
            if(songPlaying) {
                const blocks = document.querySelectorAll('.sequence-block');
                if(blocks.length === 0) {
                    songPlaying = false;
                    return;
                }
                songBtn.style.background = 'var(--active-glow)';
                songBtn.style.color = '#fff';
                
                songBlockIndex = 0;
                songTokenIndex = 0;
                prepareSongBlockData(blocks[songBlockIndex]);
                
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduleIntervalId = setInterval(songScheduler, 15);
            } else {
                stopSongPlayback();
            }
        });
    }

    function stopSongPlayback() {
        songPlaying = false;
        document.getElementById('play-song').style.background = '#333';
        document.getElementById('play-song').style.color = '#ff6b6b';
        if(scheduleIntervalId) {
            clearInterval(scheduleIntervalId);
            scheduleIntervalId = null;
        }
        document.querySelectorAll('.sequence-block').forEach(b => b.classList.remove('playing-now'));
    }

    function prepareSongBlockData(blockEl) {
        document.querySelectorAll('.sequence-block').forEach(b => b.classList.remove('playing-now'));
        if(!blockEl) return;
        
        blockEl.classList.add('playing-now');
        const raw = blockEl.dataset.sequence || "";
        songTokensCached = raw.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== '');
        
        songNotesCached = songTokensCached
            .map(token => {
                const cleanStr = token.replace(/--|-|#/g, '');
                return parseInt(cleanStr, 10);
            })
            .filter(n => !isNaN(n) && n >= 0 && n <= 127);
    }

    function scheduler() {
        if (!rawSeqTokens.length) return;

        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleNote(currentSeqIndex, nextNoteTime);
            advanceNote();
            if (!rawSeqTokens.length) break;
        }
    }

    function songScheduler() {
        const blocks = document.querySelectorAll('.sequence-block');
        if(!blocks.length || songBlockIndex >= blocks.length) {
            stopSongPlayback();
            return;
        }

        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            if (songTokensCached.length > 0) {
                scheduleSongNote(songTokenIndex, nextNoteTime);
            }
            advanceSongNote(blocks);
            
            if (!songPlaying || songBlockIndex >= blocks.length) break;
        }
    }

    // ─── Patch Box Serialization State Engine ────────────────────────
    const patchOutputField = document.getElementById('patch-output-text');
    const patchInputField  = document.getElementById('patch-input-text');

    function initPatchSerializationSystem() {
        const copyBtn = document.getElementById('btn-patch-copy');
        const loadBtn = document.getElementById('btn-patch-load');

        copyBtn.addEventListener('click', () => {
            updatePatchString();
            if(!patchOutputField.value) return;
            
            patchOutputField.select();
            navigator.clipboard.writeText(patchOutputField.value).then(() => {
                const oldText = copyBtn.textContent;
                copyBtn.textContent = "COPIED!";
                copyBtn.style.color = "var(--active-glow)";
                setTimeout(() => {
                    copyBtn.textContent = oldText;
                    copyBtn.style.color = "";
                }, 1000);
            }).catch(err => {
                console.error("Clipboard copy rejection: ", err);
            });
        });

        loadBtn.addEventListener('click', () => {
            const dataStr = patchInputField.value.trim();
            if(!dataStr) return;

            try {
                const state = JSON.parse(dataStr);
                
                if(state.bpm) { bpm = state.bpm; document.getElementById('bpm-slider').value = bpm; document.getElementById('bpm-val').textContent = bpm; }
                if(state.sustain) document.getElementById('sustain').value = state.sustain;
                if(state.noteOffDelay) document.getElementById('noteoff-delay').value = state.noteOffDelay;
                if(state.octaveShift) document.getElementById('octave-shift').value = state.octaveShift;
                if(state.transpose !== undefined) {
                    document.getElementById('transpose').value = state.transpose;
                    document.getElementById('transpose-val').textContent = state.transpose > 0 ? '+' + state.transpose : state.transpose;
                }

                activeSemitones.clear();
                if(state.matrix1) state.matrix1.forEach(s => activeSemitones.add(s));
                buildTwoOctaveMatrixDOM('semitone-matrix', activeSemitones, 'custom');

                activeSemitones2.clear();
                if(state.matrix2) state.matrix2.forEach(s => activeSemitones2.add(s));
                buildTwoOctaveMatrixDOM('semitone-matrix2', activeSemitones2, 'custom2');

                if(activeBtn) {
                    updateChord(selectedChordRoot, selectedChordType);
                }

                const matrix = document.getElementById('block-matrix-container');
                matrix.innerHTML = '';
                highlightedBlock = null;

                if(state.blocks && Array.isArray(state.blocks)) {
                    state.blocks.forEach((bData, idx) => {
                        const block = createBlockElement(bData.seq, bData.color);
                        matrix.appendChild(block);
                        if(idx === 0) {
                            block.classList.add('highlighted');
                            highlightedBlock = block;
                        }
                    });
                }
                
                loadBtn.style.color = "#fff";
                setTimeout(() => { loadBtn.style.color = "#4ecdc4"; }, 600);
                updatePatchString();

            } catch (e) {
                alert("Invalid patch structure string parsed. Verification failed.");
                console.error(e);
            }
        });

        setTimeout(updatePatchString, 500);
    }

    function updatePatchString() {
        const blockElements = document.querySelectorAll('.sequence-block');
        const blocksData = [];
        blockElements.forEach(b => {
            blocksData.push({
                seq: b.dataset.sequence,
                color: b.style.background
            });
        });

        const projectState = {
            bpm: bpm,
            sustain: parseFloat(document.getElementById('sustain').value),
            noteOffDelay: parseFloat(document.getElementById('noteoff-delay').value),
            octaveShift: parseInt(document.getElementById('octave-shift').value, 10),
            transpose: parseInt(document.getElementById('transpose').value, 10),
            matrix1: Array.from(activeSemitones),
            matrix2: Array.from(activeSemitones2),
            blocks: blocksData
        };

        patchOutputField.value = JSON.stringify(projectState);
    }

    function scheduleNote(index, time) {
        if (!rawSeqTokens.length || !rawSeqTokens[index]) return;
        
        const token = rawSeqTokens[index];
        if (token.startsWith('x')) return;

        const cleanStr = token.replace(/--|-|#/g, '');
        const parsedMidi = parseInt(cleanStr, 10);
        if (isNaN(parsedMidi)) return;

        const matchNoteIndex = seqNotesFiltered.indexOf(parsedMidi);
        if (matchNoteIndex === -1) return;

        const delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
        setTimeout(() => {
            if (!isPlaying) return;
            const visualIndex = seqStringsData.length - 1 - matchNoteIndex;
            if (visualIndex >= 0 && visualIndex < seqStringsData.length) {
                triggerString2(visualIndex);
            }
        }, delayMs);
    }

    function scheduleSongNote(index, time) {
        if (!songTokensCached.length || !songTokensCached[index]) return;
        
        const token = songTokensCached[index];
        if (token.startsWith('x')) return;

        const cleanStr = token.replace(/--|-|#/g, '');
        const parsedMidi = parseInt(cleanStr, 10);
        if (isNaN(parsedMidi)) return;

        const delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
        setTimeout(() => {
            if (!songPlaying) return;
            const shift = parseInt(document.getElementById('octave-shift').value, 10)*12 + parseInt(document.getElementById('transpose').value, 10);
            const finalMidi = Math.max(0, Math.min(127, parsedMidi + shift));
            playNote(finalMidi); 
            midiNoteOn(finalMidi);
        }, delayMs);
    }

    function advanceNote() {
        if (!rawSeqTokens.length) {
            currentSeqIndex = 0;
            return;
        }

        const activeToken = rawSeqTokens[currentSeqIndex];
        const durationInBeats = getTokenDurationInBeats(activeToken);
        
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += secondsPerBeat * durationInBeats; 
        
        currentSeqIndex = (currentSeqIndex + 1) % rawSeqTokens.length;
    }

    function advanceSongNote(blocks) {
        if (songTokensCached.length === 0) {
            songBlockIndex++;
            songTokenIndex = 0;
            if (songBlockIndex < blocks.length) {
                prepareSongBlockData(blocks[songBlockIndex]);
            }
            return;
        }

        const activeToken = songTokensCached[songTokenIndex];
        const durationInBeats = getTokenDurationInBeats(activeToken);
        
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += secondsPerBeat * durationInBeats;
        
        songTokenIndex++;
        if (songTokenIndex >= songTokensCached.length) {
            songBlockIndex++;
            songTokenIndex = 0;
            if (songBlockIndex < blocks.length) {
                prepareSongBlockData(blocks[songBlockIndex]);
            }
        }
    }

    // ─── Bitmask-Based Matrix Engine for Multi-Key Combos ─────────────
    const heldKeysMap = new Set();
    let comboEvaluationTimeoutId = null;

    function initKeyHandlingEngine() {
        document.addEventListener('keydown', e => {
            if (e.repeat) return;
            if (document.activeElement === seqInput || document.activeElement === patchInputField || document.activeElement === patchOutputField) return;

            if (['1', '2', '3', '4', '5', '6'].includes(e.key)) {
                handleSequencerHotkeys(e.key);
                return;
            }

            heldKeysMap.add(e.key.toLowerCase());

            if (comboEvaluationTimeoutId) clearTimeout(comboEvaluationTimeoutId);
            comboEvaluationTimeoutId = setTimeout(evaluateKeyboardMatrixChords, 15);
        });

        document.addEventListener('keyup', e => {
            heldKeysMap.delete(e.key.toLowerCase());
        });
    }

    function handleSequencerHotkeys(key) {
        if (key === '1') {
            const restToken = currentRhythmSuffix === '#' ? 'x#' : 'x';
            insertTokenAtCursor(restToken);
        } else if (key === '2') {
            deleteLastToken();
        } else if (key === '3') {
            changeRhythmMode('-', document.getElementById('rhythm-btn-8th'));
        } else if (key === '4') {
            changeRhythmMode('', document.getElementById('rhythm-btn-16th'));
        } else if (key === '5') {
            changeRhythmMode('--', document.getElementById('rhythm-btn-dot8th'));
        } else if (key === '6') {
            changeRhythmMode('#', document.getElementById('rhythm-btn-trip8th'));
        }
    }

    function evaluateKeyboardMatrixChords() {
        if (heldKeysMap.size === 0) return;

        const row1 = KEY_ROWS.major;
        const row2 = KEY_ROWS.minor;
        const row3 = KEY_ROWS.seventh;

        for (let i = 0; i < row1.length; i++) {
            const k1 = row1[i];
            const k2 = row2[i];
            const k3 = row3[i];

            if (k1 && k2 && heldKeysMap.has(k1) && heldKeysMap.has(k2)) {
                if (chordButtonGrid.custom[i]) {
                    chordButtonGrid.custom[i].activate();
                    return;
                }
            }

            if (k2 && k3 && heldKeysMap.has(k2) && heldKeysMap.has(k3)) {
                if (chordButtonGrid.custom2[i]) {
                    chordButtonGrid.custom2[i].activate();
                    return;
                }
            }
        }

        for (let i = 0; i < row1.length; i++) {
            if (heldKeysMap.has(row1[i]) && chordButtonGrid.major[i]) { chordButtonGrid.major[i].activate(); return; }
            if (heldKeysMap.has(row2[i]) && chordButtonGrid.minor[i]) { chordButtonGrid.minor[i].activate(); return; }
            if (heldKeysMap.has(row3[i]) && chordButtonGrid.seventh[i]) { chordButtonGrid.seventh[i].activate(); return; }
        }
    }
</script>

<script>
(function() {
    let metronomeEnabled = true;
    let metronomeIntervalId = null;
    let currentBeat = 0; // 0 = Beat 1, 1 = Beat 2, etc.

    window.addEventListener('DOMContentLoaded', () => {
        // 1. Create and position the metronome dot to the left of the BPM slider
        const dot = document.createElement('div');
        dot.id = 'metronome-dot';
        dot.className = 'enabled';
        dot.title = 'Toggle Metronome ON/OFF';

        // Automatically target your BPM slider/input container
        const bpmSlider = document.querySelector('input[type="range"][id*="bpm"]') || 
                          document.querySelector('input[type="range"][id*="tempo"]') ||
                          document.querySelector('#tempo-slider') ||
                          document.querySelector('[id*="bpm"]');

        if (bpmSlider) {
            // Insert directly to the left of the slider or its parent container label
            if (bpmSlider.parentElement) {
                bpmSlider.parentElement.insertBefore(dot, bpmSlider);
            } else {
                bpmSlider.before(dot);
            }
        } else {
            // Fallback placement inside control status if ID isn't generic
            const statusPanel = document.getElementById('midi-status');
            if (statusPanel) statusPanel.prepend(dot);
        }

        // 2. Click handler to toggle the metronome on/off manually
        dot.addEventListener('click', (e) => {
            e.stopPropagation();
            metronomeEnabled = !metronomeEnabled;
            if (metronomeEnabled) {
                dot.className = 'enabled';
            } else {
                dot.className = '';
                stopMetronome();
            }
        });

        // 3. Find your REC button to trigger the start automatically
        const recBtn = document.getElementById('rec-btn') || 
                       document.getElementById('record-btn') || 
                       Array.from(document.querySelectorAll('button')).find(b => b.innerText.includes('REC'));

        if (recBtn) {
            recBtn.addEventListener('click', () => {
                if (metronomeEnabled) {
                    startMetronome(bpmSlider);
                }
            });
        }
        
        // Alternate listener hook in case REC toggle relies on recording state changes
        const stopBtn = document.getElementById('stop-btn') || 
                        Array.from(document.querySelectorAll('button')).find(b => b.innerText.includes('STOP'));
        if (stopBtn) {
            stopBtn.addEventListener('click', stopMetronome);
        }
    });

    function startMetronome(bpmSlider) {
        stopMetronome(); // Clear any running loop safely
        currentBeat = 0;
        
        function pulse() {
            if (!metronomeEnabled) return;

            const dot = document.getElementById('metronome-dot');
            if (!dot) return;

            // Flash visual accent based on the beat cycle
            if (currentBeat === 0) {
                dot.classList.add('beat-strong');
            } else {
                dot.classList.add('beat-weak');
            }

            // Remove visual flash quickly to create a crisp pulse effect
            setTimeout(() => {
                dot.classList.remove('beat-strong', 'beat-weak');
            }, 120);

            // Cycle through beats 1, 2, 3, 4
            currentBeat = (currentBeat + 1) % 4;

            // Dynamically query current UI BPM to maintain real-time sync if slider moves
            const currentBPM = bpmSlider ? parseFloat(bpmSlider.value) : 120;
            const msPerBeat = 60000 / (currentBPM || 120);

            // Schedule next beat precisely
            metronomeIntervalId = setTimeout(pulse, msPerBeat);
        }

        pulse();
    }

    function stopMetronome() {
        if (metronomeIntervalId) {
            clearTimeout(metronomeIntervalId);
            metronomeIntervalId = null;
        }
        const dot = document.getElementById('metronome-dot');
        if (dot) {
            dot.classList.remove('beat-strong', 'beat-weak');
        }
    }
})();
</script>

<script>
(function() {
    let leftChannelBuffer = [];
    let rightChannelBuffer = [];
    let recordingProcessor = null;
    let isRendering = false;
    let targetAudioContext = null;

    window.addEventListener('DOMContentLoaded', () => {
        const playBtn = document.getElementById('play-btn') || 
                        document.getElementById('play-song-btn') || 
                        Array.from(document.querySelectorAll('button')).find(b => b.innerText.trim() === 'PLAY' || b.innerText.includes('Play'));

        if (!playBtn) return;

        const renderBtn = document.createElement('button');
        renderBtn.id = 'render-audio-btn';
        renderBtn.innerText = 'RENDER';
        renderBtn.title = 'Click to start tape. Captures playback and live play indefinitely. Click again to save WAV.';
        playBtn.after(renderBtn);

        const manualLink = document.createElement('a');
        manualLink.id = 'render-download-link';
        manualLink.style.display = 'none';
        renderBtn.after(manualLink);

        renderBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isRendering) stopRendering();
            else startRendering(playBtn, renderBtn, manualLink);
        });
    });

    function startRendering(playBtn, renderBtn, manualLink) {
        manualLink.style.display = 'none';

        // 1. THE FORCE-BIRTH: If the app hasn't made a context yet, spin one up right now.
        if (!window.__OMNI_FLARE) {
            try { new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        }

        // 2. Lock onto the Tollbooth's broadcast flare
        let rawCtx = window.__OMNI_FLARE || window.audioCtx || window.audioContext;
        
        // Unpack Tone.js if it wrapped the context
        if (!rawCtx && window.Tone && window.Tone.context) {
            rawCtx = window.Tone.context._context || window.Tone.context.rawContext || window.Tone.context;
        }

        if (!rawCtx || !rawCtx.__masterTollbooth) {
            alert("Audio context error: Could not lock onto the internal synthesizer engine.");
            return;
        }

        targetAudioContext = rawCtx;
        if (targetAudioContext.state === 'suspended') targetAudioContext.resume();

        isRendering = true;
        leftChannelBuffer = [];
        rightChannelBuffer = [];

        renderBtn.classList.add('recording');
        renderBtn.innerText = 'REC...';

        const bufferSize = 2048;
        recordingProcessor = targetAudioContext.createScriptProcessor(bufferSize, 2, 2);
        
        recordingProcessor.onaudioprocess = (e) => {
            if (!isRendering) return;
            const inputBuffer = e.inputBuffer;
            leftChannelBuffer.push(new Float32Array(inputBuffer.getChannelData(0)));
            rightChannelBuffer.push(new Float32Array(inputBuffer.getChannelData(1)));
        };

        // Complete the physical wire circuit
        targetAudioContext.__masterTollbooth.connect(recordingProcessor);
        recordingProcessor.connect(targetAudioContext.__realDestination);

        // Hit the machine's Play button
        playBtn.click();
    }

    function stopRendering() {
        if (!isRendering) return;
        isRendering = false;

        const renderBtn = document.getElementById('render-audio-btn');
        if (renderBtn) {
            renderBtn.classList.remove('recording');
            renderBtn.innerText = 'RENDER';
        }

        if (recordingProcessor && targetAudioContext) {
            targetAudioContext.__masterTollbooth.disconnect(recordingProcessor);
            recordingProcessor.disconnect();
            recordingProcessor.onaudioprocess = null;
            recordingProcessor = null;
        }

        exportHighFidelityWav();
    }

    function exportHighFidelityWav() {
        const sampleRate = targetAudioContext ? targetAudioContext.sampleRate : 44100;
        
        const flattenChannel = (channelBuffer) => {
            let totalLength = channelBuffer.reduce((acc, buf) => acc + buf.length, 0);
            let result = new Float32Array(totalLength);
            let offset = 0;
            for (let i = 0; i < channelBuffer.length; i++) {
                result.set(channelBuffer[i], offset);
                offset += channelBuffer[i].length;
            }
            return result;
        };

        const leftFlat = flattenChannel(leftChannelBuffer);
        const rightFlat = flattenChannel(rightChannelBuffer);
        const sampleCount = leftFlat.length;

        if (sampleCount === 0) {
            alert("Zero audio frames captured.");
            return;
        }

        const buffer = new ArrayBuffer(44 + sampleCount * 4);
        const view = new DataView(buffer);
        const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + sampleCount * 4, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 2, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 4, true);
        view.setUint16(32, 4, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, sampleCount * 4, true);

        let offset = 44;
        for (let i = 0; i < sampleCount; i++) {
            let sL = Math.max(-1, Math.min(1, leftFlat[i]));
            view.setInt16(offset, sL < 0 ? sL * 0x8000 : sL * 0x7FFF, true);
            let sR = Math.max(-1, Math.min(1, rightFlat[i]));
            view.setInt16(offset + 2, sR < 0 ? sR * 0x8000 : sR * 0x7FFF, true);
            offset += 4;
        }

        const blob = new Blob([buffer], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const filename = `Omnichord_Render_${new Date().toLocaleTimeString().replace(/:/g, '-')}.wav`;

        const manualLink = document.getElementById('render-download-link');
        if (manualLink) {
            manualLink.href = url;
            manualLink.download = filename;
            manualLink.innerText = "⬇ Download Master (.wav)";
            manualLink.style.display = 'block';
        }

        const autoLink = document.createElement('a');
        autoLink.href = url;
        autoLink.download = filename;
        document.body.appendChild(autoLink);
        autoLink.click();
        document.body.removeChild(autoLink);
    }
})();
</script>
</body>
</html>
